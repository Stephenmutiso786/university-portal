services:
  postgres:
    image: postgres:16-alpine
    container_name: techhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: university_portal
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: portal_password
    # No host port mapping needed for production; the app connects via Docker network.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d university_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal:
    build: .
    container_name: techhub-portal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      - portal-data:/app/backend/data
    command: sh -c "npm run db:setup && node index.js"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  portal-data:
